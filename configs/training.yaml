# Training configuration
# Override per experiment by copying this file:
#   cp configs/training.yaml configs/experiment_v2.yaml

# Data
raw_data: data/raw/backlinks.parquet
processed_data: data/processed/backlinks_cleaned.parquet
train_data: data/engineered/train_df.parquet
test_data: data/engineered/test_df.parquet

# Splits (domain-grouped: all records for a domain go to one split)
test_size: 0.2
val_size: 0.1
random_state: 42
split_method: domain_grouped

# Target (log-transformed price)
target: log_price

# Features
feature_columns:
  - dr
  - cf
  - tf
  - log_traffic
  - tld_encoded
  - country_encoded
  - year
  - month
  - quarter
  - cf_missing_flag
  - tf_missing_flag
  - country_missing_flag

# Categorical columns to label-encode
categorical_columns:
  - tld
  - country


n_optuna_trials: 100
early_stopping_rounds: 50
optuna_storage: sqlite:///models/optuna_studies.db
optuna_study_name: xgb_backlink_pricing

xgb_search_space:
  n_estimators: [100, 1000]
  max_depth: [3, 12]
  learning_rate: [0.01, 0.3]
  subsample: [0.6, 1.0]
  colsample_bytree: [0.6, 1.0]
  reg_alpha: [1.0e-8, 10.0]
  reg_lambda: [1.0e-8, 10.0]
  min_child_weight: [1, 10]


autogluon:
  preset: high_quality
  time_limit: 3600          # seconds (1 hour); increase for better results
  eval_metric: root_mean_squared_error
  # Full search: all model families with bagging and stacking.
  model_families: [GBM, CAT, XGB, RF, XT, NN_TORCH, FASTAI]
  auto_stack: false
  num_bag_folds: 5
  num_stack_levels: 1
  num_bag_sets: 1                # single bag set to reduce memory pressure
  use_bag_holdout: true
  verbosity: 2
  # AutoGluon handles categoricals natively — pass raw tld/country, not encoded
  feature_columns:
    - dr
    - cf
    - tf
    - log_traffic
    - tld
    - country
    - year
    - month
    - quarter
    - cf_missing_flag
    - tf_missing_flag
    - country_missing_flag
  refit_full: true           # retrain best model on 100% data for production
  save_dir: models/autogluon
  openfe_top_k: 0            # OpenFE is expensive; enable only for targeted experiments


mlflow_tracking_uri: mlruns
mlflow_experiment_name: backlink-pricing


model_dir: models
model_filename: xgb_backlink_pricing.joblib
metrics_filename: metrics_summary.csv
